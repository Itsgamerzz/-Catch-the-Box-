<!DOCTYPE html>
<html>
<head>
    <title>Catch the Box</title>
    <style>
        body{
            margin:0;
            overflow:hidden;
            background:#222;
            font-family:Arial;
            color:white;
            text-align:center;
        }

        h1{
            margin-top:20px;
        }

        #score{
            font-size:24px;
        }

        #box{
            width:60px;
            height:60px;
            background:red;
            position:absolute;
            border-radius:10px;
            cursor:pointer;
            transition:0.1s;
        }
    </style>
</head>
<body>

<h1>🎮 Catch the Box!</h1>
<div id="score">Score: 0</div>

<div id="box"></div>

<script>
let score = 0;
const box = document.getElementById("box");
const scoreText = document.getElementById("score");

function moveBox(){
    const x = Math.random() * (window.innerWidth - 60);
    const y = Math.random() * (window.innerHeight - 60);

    box.style.left = x + "px";
    box.style.top = y + "px";
}

box.onclick = function(){
    score++;
    scoreText.innerHTML = "Score: " + score;
    moveBox();
}

moveBox();

setInterval(moveBox,1000);
</script>

</body>
</html>
